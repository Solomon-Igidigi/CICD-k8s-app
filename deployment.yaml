apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-app-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: k8s-app
  template:
    metadata:
      labels:
        app: k8s-app
    spec:
      containers:
       - name: k8s-app
         image: solzate7762/k8s-app
         imagePullPolicy: Always
         ports:
          - containerPort: 80