name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Updated to v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/k8s-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/k8s-app:latest

    # --- THIS PART REPLACES YOUR OLD KUBECONFIG STEPS ---
    - name: Start Minikube
      uses: medyagh/setup-minikube@latest
      with:
        driver: docker

    - name: Deploy to Kubernetes
      run: |
        # No need to echo secrets; setup-minikube configures kubectl automatically
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml
        kubectl rollout restart deployment k8s-app-deployment
        
    - name: Verify
      run: kubectl get pods
